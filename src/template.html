<!doctype html>
<html lang="es">
<head>
	<meta charset='utf-8'>
	<meta name='viewport' content='width=device-width,initial-scale=1.0'>
	<meta name='theme-color' content='#333333'>

	%sapper.base%

	<!-- <link rel='stylesheet' href='global.css'> -->
	<style>
		body {
			margin: 0;
			font-family: Roboto, -apple-system, BlinkMacSystemFont, Segoe UI, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif;
			font-size: 14px;
			line-height: 1.5;
			color: #333;
		}

		h1, h2, h3, h4, h5, h6 {
			margin: 0 0 0.5em 0;
			font-weight: 400;
			line-height: 1.2;
		}

		h1 {
			font-size: 2em;
		}

		a {
			color: inherit;
		}

		code {
			font-family: menlo, inconsolata, monospace;
			font-size: calc(1em - 2px);
			color: #555;
			background-color: #f0f0f0;
			padding: 0.2em 0.4em;
			border-radius: 2px;
		}

		@media (min-width: 400px) {
			body {
				font-size: 16px;
			}
		}
	</style>
	<link rel='manifest' href='manifest.json'>
	<link rel='icon' type='image/png' href='favicon.png'>

	<!-- Sapper generates a <style> tag containing critical CSS
	     for the current page. CSS for the rest of the app is
	     lazily loaded when it precaches secondary pages -->
	%sapper.styles%

	<!-- This contains the contents of the <svelte:head> component, if
	     the current page has one -->
	%sapper.head%

	<script type="application/ld+json">
		{
			"@context" : "http://schema.org",
			"@graph": [{
				"@type": "Organization",
				"@id": "https://www.garitacenter.com/#organization",
				"name": "Garita Center",
				"url": "https://www.garitacenter.com/",
				"sameAs": ["https://www.facebook.com/garitacenter/"],
				"logo": {
					"@type": "ImageObject",
					"@id": "https://www.garitacenter.com/#logo",
					"url": "https://scontent-ort2-2.xx.fbcdn.net/v/t1.0-9/383937_254192751306135_501132470_n.jpg?_nc_cat=100&_nc_ohc=JU0HE6AXPWMAQlUpkV48ZcTm11mQWfPZqc7xOPzuYN5JqZW1VoxrBf21w&_nc_ht=scontent-ort2-2.xx&oh=93a1b3664778312c490fe10aa570a425&oe=5E8237AC",
					"width": 327,
					"height": 327,
					"caption": "Reporte de Garitas"
				},
				"image": {
					"@id": "https://www.garitacenter.com/#logo"
				}
			}, {
				"@type": "WebSite",
				"@id": "https://www.garitacenter.com/#website",
				"url": "https://www.garitacenter.com/",
				"name": "Garita Center",
				"description": "Reporte de Garitas",
				"publisher": {
					"@id": "https://www.garitacenter.com/#organization"
				},
				"potentialAction": {
					"@type": "SearchAction",
					"target": "https://www.garitacenter.com/?s={search_term_string}",
					"query-input": "required name=search_term_string"
				}
			}, {
				"@type": "ImageObject",
				"@id": "https://www.garitacenter.com/#primaryimage",
				"url": "  ",
				"width": 1200,
				"height": 630,
				"caption": "Reporte de Garitas"
			}, {
				"@type": "WebPage",
				"@id": "https://www.garitacenter.com/#webpage",
				"url": "https://www.garitacenter.com",
				"inLanguage": "es-MX",
				"name": "Reporte de garitas en Tijuana, San Ysidro y Otay Mesa | Garita Center",
				"isPartOf": {
					"@id": "https://www.garitacenter.com/#website"
				},
				"about": {
					"@id": "https://www.garitacenter.com/#organization"
				},
				"primaryImageOfPage": {
					"@id": "https://www.garitacenter.com/#primaryimage"
				},
				"datePublished": "2019-12-01T04:38:56+00:00",
				"dateModified": "2019-12-04T08:43:37+00:00",
				"description": "GaritaCenter muestra el tiempo de espera para cruzar de Tijuana a San Ysidro y Otay."
			}]
		}
	</script>

</head>
<body>
	<!-- The application will be rendered inside this element,
	     because `src/client.js` references it -->
	<div id='sapper'>%sapper.html%</div>

	<!-- Sapper creates a <script> tag containing `src/client.js`
	     and anything else it needs to hydrate the app and
	     initialise the router -->
	%sapper.scripts%
</body>
</html>
