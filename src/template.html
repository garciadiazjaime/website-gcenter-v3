<!doctype html>
<html lang="es">
<head>
	<meta charset='utf-8'>
	<meta name='viewport' content='width=device-width,initial-scale=1.0'>
	<meta name='theme-color' content='#333333'>

	%sapper.base%

	<!-- <link rel='stylesheet' href='global.css'> -->
	<style>
		body {
			margin: 0;
			font-family: Roboto, -apple-system, BlinkMacSystemFont, Segoe UI, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif;
			font-size: 14px;
			line-height: 1.5;
			color: #333;
		}

		h1, h2, h3, h4, h5, h6 {
			margin: 0 0 0.5em 0;
			font-weight: 400;
			line-height: 1.2;
		}

		h1 {
			font-size: 2em;
		}

		a {
			color: inherit;
		}

		code {
			font-family: menlo, inconsolata, monospace;
			font-size: calc(1em - 2px);
			color: #555;
			background-color: #f0f0f0;
			padding: 0.2em 0.4em;
			border-radius: 2px;
		}

		@media (min-width: 400px) {
			body {
				font-size: 16px;
			}
		}
	</style>
	<link rel='manifest' href='manifest.json'>
	<link rel='icon' type='image/png' href='favicon.png'>

	<!-- Sapper generates a <style> tag containing critical CSS
	     for the current page. CSS for the rest of the app is
	     lazily loaded when it precaches secondary pages -->
	%sapper.styles%

	<!-- This contains the contents of the <svelte:head> component, if
	     the current page has one -->
	%sapper.head%

	<script type="application/ld+json">
		{
			"@context" : "http://schema.org",
			"@graph": [{
				"@type": "Organization",
				"@id": "https://www.garitacenter.com/#organization",
				"name": "GaritaCenter",
				"alternateName": "Reporte de Gartias",
				"url": "https://www.garitacenter.com/",
				"logo": "https://www.garitacenter.com/garita-center-logo.jpg",
				"sameAs": [
					"https://www.facebook.com/garitacenter/",
					"https://twitter.com/garita_center",
					"https://github.com/garciadiazjaime/website-gcenter-v3"
				]
			}, {
				"@type": "WebSite",
				"name": "GaritaCenter",
				"url": "https://www.garitacenter.com/",
				"description": "Reporte de Garitas las 24 horas para cruzar la línea fronteriza de Tijuana - San Diego para el puerto de San Ysidro y Otay.",
				"potentialAction": {
					"@type": "SearchAction",
					"target": "https://www.garitacenter.com/?s={search_term_string}{search_term_string}",
					"query-input": "required name=search_term_string"
				},
				"inLanguage": "es-MX",
				"datePublished": "2011-10-21T04:38:56+00:00",
				"dateModified": "2019-12-16T08:43:37+00:00"
			}]
		}
	</script>

</head>
<body>
	<!-- The application will be rendered inside this element,
	     because `src/client.js` references it -->
	<div id='sapper'>%sapper.html%</div>

	<!-- Sapper creates a <script> tag containing `src/client.js`
	     and anything else it needs to hydrate the app and
	     initialise the router -->
	%sapper.scripts%
</body>
</html>
